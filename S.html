<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة المضرب النيون الاحترافية 🏓</title>
  <!-- خط Google Cairo الحديث -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Cairo', sans-serif;
      background: radial-gradient(circle at center, #1a1c29 0%, #0e1017 100%);
      color: #fff;
      display: flex;
      flex-col: direction;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* الحاوية الرئيسية للعبة */
    .game-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding: 10px;
      width: 100%;
      max-width: 900px;
    }

    /* لوحة النتائج والإعدادات */
    .header-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 25px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    #scoreBox {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    .difficulty-select {
      background: #1f2335;
      color: #00f0ff;
      border: 1px solid #00f0ff44;
      padding: 6px 12px;
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      cursor: pointer;
      outline: none;
      transition: all 0.3s;
    }
    .difficulty-select:focus {
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
    }

    /* منطقة اللعب (Canvas) */
    #gameCanvas {
      background: #0b0c10;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.15), inset 0 0 20px rgba(0,0,0,0.8);
      border: 2px solid rgba(255, 255, 255, 0.1);
      max-width: 100%;
      height: auto;
    }

    /* أزرار التحكم السفلية */
    .control-panel {
      display: flex;
      gap: 15px;
      align-items: center;
      justify-content: center;
      width: 100%;
      flex-wrap: wrap;
    }

    button {
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      padding: 10px 24px;
      font-size: 15px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-blue {
      background: linear-gradient(135deg, #007BFF, #0056b3);
      color: white;
      box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
    }
    .btn-blue:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 123, 255, 0.5);
    }

    .btn-primary-control {
      background: rgba(255, 255, 255, 0.07);
      color: white;
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 110px;
      justify-content: center;
    }
    .btn-primary-control:active {
      background: #00f0ff;
      color: #000;
    }

    #restartBtn {
      background: linear-gradient(135deg, #00ff87, #60efff);
      color: #000;
      font-weight: 900;
      box-shadow: 0 4px 20px rgba(0, 255, 135, 0.4);
      display: none;
    }
    #restartBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(0, 255, 135, 0.6);
    }

    #names {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.5px;
    }

    /* إخفاء أزرار الأسهم على الشاشات الكبيرة التي تلعب بالماوس */
    @media (min-width: 768px) {
      #controls {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="game-container">
    
    <!-- لوحة التحكم العلوية -->
    <div class="header-panel">
      <div id="scoreBox">اللاعب: <span style="color:#00f0ff">0</span> | الكمبيوتر: <span style="color:#ff0055">0</span></div>
      
      <div>
        <select id="difficulty" class="difficulty-select" onchange="changeDifficulty()">
          <option value="easy">المستوى: سهل 🟢</option>
          <option value="medium" selected>المستوى: متوسط 🟡</option>
          <option value="hard">المستوى: مستحيل 🔥</option>
        </select>
      </div>
    </div>

    <!-- زر إعادة التشغيل الفخم عند انتهاء اللعبة -->
    <button id="restartBtn">🎮 العب مجدداً</button>

    <!-- مساحة اللعبة -->
    <canvas id="gameCanvas"></canvas>

    <!-- اللوحة السفلية والأزرار -->
    <div class="control-panel">
      
      <!-- الأزرار مخصصة للهواتف فقط -->
      <div id="controls" class="inline-flex gap-2">
        <button id="upBtn" class="btn-primary-control">↑ لأعلى</button>
        <button id="downBtn" class="btn-primary-control">↓ لأسفل</button>
      </div>

      <div id="names">المطور: عمر تامر محمد عادل</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreBox = document.getElementById("scoreBox");
    const restartBtn = document.getElementById("restartBtn");
    const difficultySelect = document.getElementById("difficulty");

    // إعدادات أبعاد اللعبة الثابتة داخلياً لضمان دقة فيزيائية ممتازة ومطابقة العرض
    canvas.width = 800;
    canvas.height = 500;

    const paddleWidth = 12, paddleHeight = 90;
    let playerY = canvas.height / 2 - paddleHeight / 2;
    let aiY = canvas.height / 2 - paddleHeight / 2;
    
    // سرعات الحركة
    let paddleSpeed = 8;
    let aiSkill = 0.12; // يمثل سرعة استجابة الكمبيوتر (متوسط افتراضياً)

    // إعدادات الكرة الافتراضية المتقدمة
    let ballX = canvas.width / 2, ballY = canvas.height / 2;
    let initialSpeedX = 6, initialSpeedY = 4;
    let ballSpeedX = initialSpeedX, ballSpeedY = initialSpeedY;
    let speedMultiplier = 1.05; // تزداد سرعة الكرة 5% مع كل ضربة مضرب لكثافة حركية أعلى
    const ballSize = 8;

    let playerScore = 0;
    let aiScore = 0;
    const winScore = 5;
    let gameOver = false;

    // مصفوفة لتأثير الانفجار المضيء (جزيئات نيون عند الاصطدام)
    let particles = [];

    function createParticles(x, y, color) {
      for (let i = 0; i < 12; i++) {
        particles.push({
          x: x,
          y: y,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6,
          radius: Math.random() * 3 + 1,
          alpha: 1,
          color: color
        });
      }
    }

    function drawParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.02;
        if (p.alpha <= 0) {
          particles.splice(i, 1);
          continue;
        }
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function changeDifficulty() {
      const mode = difficultySelect.value;
      if (mode === "easy") aiSkill = 0.07;
      if (mode === "medium") aiSkill = 0.13;
      if (mode === "hard") aiSkill = 0.23; // ذكاء اصطناعي حاد وصعب جداً الصد أمامه
    }

    function drawRect(x, y, w, h, color, glowColor) {
      ctx.save();
      if (glowColor) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = glowColor;
      }
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
      ctx.restore();
    }

    function drawCircle(x, y, r, color, glowColor) {
      ctx.save();
      if (glowColor) {
        ctx.shadowBlur = 18;
        ctx.shadowColor = glowColor;
      }
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2, false);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawNet() {
      // رسم شبكة نيون مقطعة أنيقة في منتصف الملعب
      for (let i = 10; i < canvas.height; i += 30) {
        drawRect(canvas.width / 2 - 1, i, 2, 15, "rgba(255,255,255,0.15)");
      }
    }

    function draw() {
      // تفريغ الشاشة بخلفية معتمة
      ctx.fillStyle = "#0c0d14";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawNet();

      // رسم مضرب اللاعب النيون (أخضر فوسفوري / سيان مائل للأخضر)
      drawRect(5, playerY, paddleWidth, paddleHeight, "#00f0ff", "#00f0ff");

      // رسم مضرب الكمبيوتر النيون (أحمر نيون حاد)
      drawRect(canvas.width - paddleWidth - 5, aiY, paddleWidth, paddleHeight, "#ff0055", "#ff0055");

      // رسم الكرة النيون (أبيض بتوهج أزرق ساحر)
      drawCircle(ballX, ballY, ballSize, "#ffffff", "#00f0ff");

      // رسم جزيئات الاصطدام المتناثرة
      drawParticles();
    }

    function resetBall() {
      ballX = canvas.width / 2;
      ballY = canvas.height / 2;
      // إعادة السرعة للقيمة الأساسية لضمان التدرج العادل مرة أخرى
      ballSpeedX = (ballSpeedX > 0 ? -initialSpeedX : initialSpeedX);
      ballSpeedY = initialSpeedY * (Math.random() > 0.5 ? 1 : -1);
    }

    function updateScore() {
      scoreBox.innerHTML = `اللاعب: <span style="color:#00f0ff">${playerScore}</span> | الكمبيوتر: <span style="color:#ff0055">${aiScore}</span>`;
    }

    function checkWin() {
      if (playerScore >= winScore || aiScore >= winScore) {
        gameOver = true;
        if (playerScore > aiScore) {
          scoreBox.innerHTML = `🏆 تهانينا! لقد فزت على الكمبيوتر (${playerScore} - ${aiScore})`;
        } else {
          scoreBox.innerHTML = `💀 حظاً أوفر! الكمبيوتر هو الفائز (${aiScore} - ${playerScore})`;
        }
        restartBtn.style.display = "block";
      }
    }

    function move() {
      if (gameOver) return;

      ballX += ballSpeedX;
      ballY += ballSpeedY;

      // الارتداد من الجدران العلوية والسفلية وإنتاج جزيئات بيضاء خفيفة
      if (ballY - ballSize <= 0) {
        ballY = ballSize;
        ballSpeedY = -ballSpeedY;
        createParticles(ballX, 0, "#ffffff");
      }
      if (ballY + ballSize >= canvas.height) {
        ballY = canvas.height - ballSize;
        ballSpeedY = -ballSpeedY;
        createParticles(ballX, canvas.height, "#ffffff");
      }

      // فيزياء الاصطدام الفعلي بمضرب اللاعب مع تحسين زاوية الارتداد والسرعة التدريجية
      if (ballX - ballSize <= paddleWidth + 5) {
        if (ballY > playerY && ballY < playerY + paddleHeight) {
          ballSpeedX = -ballSpeedX * speedMultiplier;
          // تغيير زاوية الكرة بناءً على نقطة ضرب المضرب لزيادة المهارة الاحترافية
          let deltaY = ballY - (playerY + paddleHeight / 2);
          ballSpeedY = deltaY * 0.25 * (Math.abs(ballSpeedX) * 0.15);
          ballX = paddleWidth + 5 + ballSize; // منع الاحتجاز
          createParticles(ballX, ballY, "#00f0ff");
        }
      }

      // فيزياء الاصطدام الفعلي بمضرب الكمبيوتر
      if (ballX + ballSize >= canvas.width - paddleWidth - 5) {
        if (ballY > aiY && ballY < aiY + paddleHeight) {
          ballSpeedX = -ballSpeedX * speedMultiplier;
          let deltaY = ballY - (aiY + paddleHeight / 2);
          ballSpeedY = deltaY * 0.25 * (Math.abs(ballSpeedX) * 0.15);
          ballX = canvas.width - paddleWidth - 5 - ballSize; // منع الاحتجاز
          createParticles(ballX, ballY, "#ff0055");
        }
      }

      // خروج الكرة واحتساب النقاط
      if (ballX < 0) {
        aiScore++;
        updateScore();
        checkWin();
        if (!gameOver) resetBall();
      }

      if (ballX > canvas.width) {
        playerScore++;
        updateScore();
        checkWin();
        if (!gameOver) resetBall();
      }

      // الذكاء الاصطناعي السلس المعتمد على مستوى الصعوبة المختار (تتبع دقيق)
      let aiTarget = ballY - paddleHeight / 2;
      aiY += (aiTarget - aiY) * aiSkill;

      if (aiY < 0) aiY = 0;
      if (aiY + paddleHeight > canvas.height) aiY = canvas.height - paddleHeight;
    }

    // ميزة اللعب السلس جداً عبر الماوس للكمبيوتر الشخصي Desktop
    canvas.addEventListener("mousemove", function(e) {
      let rect = canvas.getBoundingClientRect();
      // تحجيم نسبة الإحداثيات الفعلية للكانفاس بناء على حجمه على الشاشة
      let scaleY = canvas.height / rect.height;
      let mouseY = (e.clientY - rect.top) * scaleY;
      playerY = mouseY - paddleHeight / 2;
      
      // الحدود العليا والدنيا
      if (playerY < 0) playerY = 0;
      if (playerY + paddleHeight > canvas.height) playerY = canvas.height - paddleHeight;
    });

    // التحكم الاحترافي عبر لوحة المفاتيح
    document.addEventListener("keydown", function (e) {
      if (gameOver) return;
      if (e.key === "ArrowUp") {
        playerY -= paddleSpeed * 3;
        if (playerY < 0) playerY = 0;
      }
      if (e.key === "ArrowDown") {
        playerY += paddleSpeed * 3;
        if (playerY + paddleHeight > canvas.height) playerY = canvas.height - paddleHeight;
      }
    });

    // تفعيل وتحديث الأزرار الداعمة للمس على الأجهزة الذكية
    let moveInterval = null;
    function startMoving(direction) {
      clearInterval(moveInterval);
      moveInterval = setInterval(() => {
        if (gameOver) return;
        if (direction === "up") {
          playerY -= paddleSpeed * 2;
          if (playerY < 0) playerY = 0;
        } else if (direction === "down") {
          playerY += paddleSpeed * 2;
          if (playerY + paddleHeight > canvas.height) playerY = canvas.height - paddleHeight;
        }
      }, 16);
    }

    function stopMoving() {
      clearInterval(moveInterval);
    }

    const upBtn = document.getElementById("upBtn");
    const downBtn = document.getElementById("downBtn");

    upBtn.addEventListener("mousedown", () => startMoving("up"));
    downBtn.addEventListener("mousedown", () => startMoving("down"));
    document.addEventListener("mouseup", stopMoving);

    upBtn.addEventListener("touchstart", (e) => { e.preventDefault(); startMoving("up"); });
    downBtn.addEventListener("touchstart", (e) => { e.preventDefault(); startMoving("down"); });
    document.addEventListener("touchend", stopMoving);

    // إعادة اللعبة بالكامل
    restartBtn.addEventListener("click", function () {
      playerScore = 0;
      aiScore = 0;
      updateScore();
      restartBtn.style.display = "none";
      gameOver = false;
      resetBall();
    });

    // حلقة اللعبة الأساسية المستمرة والمستقرة
    function gameLoop() {
      move();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // حماية الشفرات والتعطيل المدمج مسبقاً في كودك
    window.addEventListener("contextmenu", function(e) { e.preventDefault(); });
    document.addEventListener("keydown", function(e) {
      const forbiddenKeys = [
        (e.ctrlKey && e.key.toLowerCase() === 'u'),
        (e.key === "F12"),
        (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i'),
        (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'c'),
        (e.ctrlKey && e.key.toLowerCase() === 's'),
        (e.ctrlKey && e.key.toLowerCase() === 'p')
      ];
      if (forbiddenKeys.some(Boolean)) {
        e.preventDefault();
      }
    });

    // رابط فيسبوك المخصص للاختصار Ctrl + Q
    document.addEventListener("keydown", function(e) {
      if (e.ctrlKey && e.key.toLowerCase() === 'q') {
        e.preventDefault();
        window.open("https://www.facebook.com/omar.tamer.adel", "_blank");
      }
    });

    // بدء الإطلاق والتحضير الفوري للعبة
    changeDifficulty();
    updateScore();
    gameLoop();
  </script>
</body>
</html>
