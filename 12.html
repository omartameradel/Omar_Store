        :root {

            margin: 0;
            padding: 20px;
        }

        .wrapper {

            margin: 0 auto;
        }

        header {
            text-align: center;

            -webkit-text-fill-color: transparent;
        }

            top: 20px;
            z-index: 1000;
            margin-bottom: 40px;
        }

            border-radius: 15px;
            border: 2px solid #2d3748;
            background: var(--card-bg);
            color: white;
            font-size: 18px;
            outline: none;

        }

        #searchInput:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        .qa-container {
            display: grid;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            border-left: 4px solid var(--primary);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: scale(1.01);
            background: #1c253d;
        }

        .q-text {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #fff;
            line-height: 1.5;
            display: block;
        }

        .a-text {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            color: var(--success);
            font-family: 'Fira Code', monospace;
            border: 1px solid #2d3748;
        }

        .a-text::before {
            content: "Answer: ";
            color: var(--secondary);
            font-weight: bold;
        }

        .no-data {
            text-align: center;
            font-size: 20px;
            margin-top: 50px;
            color: #718096;
        }

        .highlight {
            background: rgba(157, 80, 187, 0.4);
            color: #fff;
            padding: 2px 4px;
            border-radius: 4px;
        }
    </style>
</head>

    const qaList = document.getElementById('qaList');
    const searchInput = document.getElementById('searchInput');
    const noResults = document.getElementById('noResults');

    function displayData(query = '') {
        qaList.innerHTML = '';
        const filtered = qaData.filter(item => 
            item.q.toLowerCase().includes(query.toLowerCase()) || 
            item.a.toLowerCase().includes(query.toLowerCase())
        );

        if (filtered.length === 0) {
            noResults.style.display = 'block';
        } else {
            noResults.style.display = 'none';
            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="q-text">${highlight(item.q, query)}</span>
                    <div class="a-text">${highlight(item.a, query)}</div>
                `;
                qaList.appendChild(card);
            });
        }
    }

    function highlight(text, query) {
        if (!query) return text;
        const regex = new RegExp(`(${query})`, 'gi');
        return text.replace(regex, `<span class="highlight">$1</span>`);
    }

    searchInput.addEventListener('input', (e) => {
        displayData(e.target.value);
    });

    // Initial render
    displayData();
</script>
