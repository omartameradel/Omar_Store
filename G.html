<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة الدردشة الذكية الخارقة 🤖</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
    }
    .glass-panel {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 5px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.2);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(99, 102, 241, 0.5);
    }
  </style>
</head>
<body class="text-slate-100 h-screen flex flex-col justify-between p-2 md:p-6">

  <div id="loginPage" class="w-full max-w-md mx-auto my-auto p-6 glass-panel rounded-2xl shadow-2xl border border-slate-800 flex flex-col space-y-4">
    <div class="text-center space-y-2">
      <div class="w-12 h-12 bg-indigo-600/20 text-indigo-400 rounded-xl flex items-center justify-center text-2xl mx-auto shadow-lg shadow-indigo-500/10">
        <i class="fa-solid fa-lock"></i>
      </div>
      <h2 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">تسجيل الدخول للمنصة</h2>
    </div>
    
    <div class="space-y-3">
      <input type="email" id="email" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-all" placeholder="البريد الإلكتروني">
      <input type="password" id="password" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-all" placeholder="كلمة المرور">
    </div>

    <div class="flex gap-2 pt-2">
      <button onclick="login()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-xl transition-all text-sm">دخول</button>
      <button onclick="register()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold py-2.5 rounded-xl transition-all text-sm border border-slate-700">إنشاء حساب</button>
    </div>

    <div class="relative flex py-2 items-center">
      <div class="flex-grow border-t border-slate-800"></div>
      <span class="flex-shrink mx-4 text-slate-500 text-xs">أو عبر</span>
      <div class="flex-grow border-t border-slate-800"></div>
    </div>

    <button onclick="loginGoogle()" class="w-full bg-slate-900 hover:bg-slate-850 text-white font-semibold py-2.5 rounded-xl transition-all text-sm border border-slate-800 flex items-center justify-center gap-2">
      <i class="fa-brands fa-google text-rose-500"></i> التسجيل بواسطة جوجل
    </button>
  </div>

  <div id="chatPage" class="w-full max-w-5xl mx-auto h-full flex flex-col glass-panel rounded-2xl shadow-2xl overflow-hidden border border-slate-800" style="display: none;">
    
    <header class="bg-slate-900/80 px-6 py-4 flex items-center justify-between border-b border-slate-800/80">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-indigo-600/20 text-indigo-400 rounded-xl flex items-center justify-center text-xl shadow-lg shadow-indigo-500/10 animate-pulse">
          <i class="fa-solid fa-brain"></i>
        </div>
        <div>
          <h1 class="text-md md:text-lg font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">مساعد الذكاء الاصطناعي الخارق</h1>
          <p class="text-[10px] text-emerald-400 font-semibold flex items-center gap-1"><span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span> متصل ومستعد للتحليل</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div class="text-[11px] text-slate-500 font-medium hidden sm:block">&copy; عمر تامر محمد عادل</div>
        <button onclick="logout()" class="text-xs bg-slate-800 hover:bg-rose-900/40 border border-slate-700 text-rose-400 px-3 py-1.5 rounded-lg transition-all flex items-center gap-1">
          <i class="fa-solid fa-right-from-bracket"></i> خروج
        </button>
      </div>
    </header>

    <main id="chatWindow" class="flex-1 p-4 md:p-6 overflow-y-auto space-y-4 custom-scrollbar bg-slate-950/20">
      </main>

    <div id="aiLoadingIndicator" class="px-6 py-2 bg-slate-900/40 hidden">
      <div class="flex items-center gap-2 text-xs text-indigo-400 font-medium">
        <i class="fa-solid fa-circle-notch animate-spin"></i> جاري قراءة الملف وتوليد الحلول الذكية...
      </div>
    </div>

    <div id="attachmentPreview" class="px-6 py-3 bg-slate-900/60 border-t border-slate-800 flex items-center justify-between hidden">
      <div class="flex items-center gap-3">
        <div id="attachmentIcon" class="text-xl text-indigo-400"><i class="fa-solid fa-file-invoice"></i></div>
        <div>
          <p id="attachmentName" class="text-xs font-semibold text-slate-200 max-w-xs truncate">file_name.pdf</p>
          <p id="attachmentSize" class="text-[10px] text-slate-500">جاري الرفع السحابي...</p>
        </div>
      </div>
      <button onclick="removeAttachment()" class="text-rose-400 hover:text-rose-300 text-sm p-1"><i class="fa-solid fa-circle-xmark"></i></button>
    </div>

    <footer class="bg-slate-900/90 p-3 md:p-4 border-t border-slate-800/80">
      <div class="flex items-center gap-2 max-w-full">
        
        <input type="file" id="filePicker" class="hidden" onchange="handleFileSelection(event)">
        <button onclick="document.getElementById('filePicker').click()" class="w-11 h-11 bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-indigo-400 rounded-xl transition-colors shrink-0 flex items-center justify-center text-lg" title="إرفاق ملف أو صورة">
          <i class="fa-solid fa-paperclip"></i>
        </button>

        <div class="flex-1 relative">
          <input type="text" id="userInput" onkeydown="if(event.key === 'Enter') sendNewMessage()" class="w-full bg-slate-950 border border-slate-800 rounded-xl pr-4 pl-4 py-3 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-all" placeholder="اكتب سؤالك أو اشرح ما تريد حله هنا...">
        </div>

        <button id="sendBtn" onclick="sendNewMessage()" class="w-11 h-11 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl transition-all shadow-lg shadow-indigo-600/10 shrink-0 flex items-center justify-center text-lg">
          <i class="fa-solid fa-paper-plane transform rotate-180"></i>
        </button>

      </div>
    </footer>

  </div>

  <script>
    // 1. إعدادات Firebase الخاصة بمشروعك
    const firebaseConfig = {
      apiKey: "AIzaSyD4B49RUOXRXcW9S7Nv4puz9m7QKoAa_tE",
      authDomain: "programomartamer-451a5.firebaseapp.com",
      projectId: "programomartamer-451a5",
      storageBucket: "programomartamer-451a5.firebasestorage.app",
      messagingSenderId: "351835913301",
      appId: "1:351835913301:web:d722fdcc9fb7b15c4468dc",
      measurementId: "G-R5FJQY220K"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    const auth = firebase.auth();
    
    let currentUser = null; 

    // 2. إعدادات مسار تواصل Gemini API بالنسخة المستقرة والمحدثة
    const GEMINI_API_KEY = "AQ.Ab8RN6LZLIxRgqxI6e3wgbmrhUL-ZEvAPOapdq3BTCR3yy1WUg"; 
    const GEMINI_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

    let currentAttachment = null; 
    let chatUnsubscribe = null; // لإيقاف الاستماع للمحادثة القديمة عند تسجيل الخروج

    // مراقبة حالة جلسة المستخدم الفعالة
    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("chatPage").style.display = "flex";
        initChatStream();
      } else {
        currentUser = null;
        document.getElementById("loginPage").style.display = "flex";
        document.getElementById("chatPage").style.display = "none";
        if (chatUnsubscribe) chatUnsubscribe(); // إلغاء تفعيل دالة الـ Listener
      }
    });

    // دالات نظام المصادقة والمستخدمين
    async function login() {
  const emailInput = document.getElementById("email").value.trim();
  const passwordInput = document.getElementById("password").value;

  // فحص أولي للتأكد من أن المستخدم لم يترك الحقل فارغاً
  if (!emailInput || !passwordInput) {
    alert("الرجاء إدخال البريد الإلكتروني وكلمة المرور");
    return;
  }

  try {
    await auth.signInWithEmailAndPassword(emailInput, passwordInput);
  } catch (error) {
    // ترجمة الخطأ للمستخدم بشكل مفهوم
    if (error.code === "auth/invalid-email") {
      alert("صيغة البريد الإلكتروني غير صحيحة! تأكد من كتابته بشكل سليم (مثال: user@mail.com)");
    } else {
      alert(error.message);
    }
  }
}

async function register() {
  const emailInput = document.getElementById("email").value.trim();
  const passwordInput = document.getElementById("password").value;

  if (!emailInput || !passwordInput) {
    alert("الرجاء ملء جميع الحقول لإنشاء الحساب");
    return;
  }

  try {
    await auth.createUserWithEmailAndPassword(emailInput, passwordInput);
    alert("تم إنشاء الحساب بنجاح");
  } catch (error) {
    if (error.code === "auth/invalid-email") {
      alert("صيغة البريد الإلكتروني غير صحيحة! تأكد من كتابته بشكل سليم (مثال: user@mail.com)");
    } else {
      alert(error.message);
    }
  }
}

    async function loginGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
      } catch (error) {
        alert("خطأ: " + error.message);
      }
    }

    async function logout() {
      await auth.signOut();
    }

    // جلب بيانات الدردشة الخاصة بالمستخدم الحالي بشكل حي وتلقائي
    function initChatStream() {
      if (!currentUser) return;

      // تحديث المسار ليصبح خاصًا بالـ uid لكل مستخدم
      chatUnsubscribe = db.collection("users")
        .doc(currentUser.uid)
        .collection("chats")
        .orderBy("timestamp", "asc")
        .onSnapshot(snapshot => {
          const chatWindow = document.getElementById("chatWindow");
          chatWindow.innerHTML = ""; 
          
          renderWelcomeMessage();

          snapshot.forEach(doc => {
            const msg = doc.data();
            renderMessageBubble(msg);
          });
          
          chatWindow.scrollTop = chatWindow.scrollHeight;
        }, error => {
          console.error("Firestore Error:", error);
        });
    }

    function renderWelcomeMessage() {
      const chatWindow = document.getElementById("chatWindow");
      chatWindow.innerHTML += `
        <div class="flex items-start gap-3 max-w-2xl">
          <div class="w-8 h-8 rounded-lg bg-indigo-600 text-white flex items-center justify-center text-xs shrink-0"><i class="fa-solid fa-robot"></i></div>
          <div class="bg-slate-900/80 border border-slate-800 px-4 py-2.5 rounded-2xl rounded-tr-none text-sm text-slate-300 leading-relaxed">
            مرحباً بك! أنا مساعدك الذكي الشامل. يمكنك التحدث معي بحرية، أو **إرفاق صور، ملفات PDF، أو مستندات برمجية ونصوص**. اسألني عن أي حل وسأجيبك فوراً!
          </div>
        </div>
      `;
    }

    function renderMessageBubble(msg) {
      const chatWindow = document.getElementById("chatWindow");
      const isUser = msg.sender === "user";
      
      const alignmentClass = isUser ? "justify-end" : "justify-start";
      const bgClass = isUser ? "bg-indigo-600 text-white rounded-tl-none" : "bg-slate-900/90 border border-slate-800 text-slate-200 rounded-tr-none";
      const avatarHtml = isUser 
        ? `<div class="w-8 h-8 rounded-lg bg-slate-800 text-indigo-400 flex items-center justify-center text-xs shrink-0 order-2"><i class="fa-solid fa-user"></i></div>`
        : `<div class="w-8 h-8 rounded-lg bg-indigo-600 text-white flex items-center justify-center text-xs shrink-0"><i class="fa-solid fa-robot"></i></div>`;

      let mediaHtml = "";
      if (msg.fileUrl) {
        if (msg.fileType && msg.fileType.startsWith("image/")) {
          mediaHtml = `<div class="mb-2"><img src="${msg.fileUrl}" class="max-w-xs max-h-52 rounded-xl object-contain border border-slate-700/50 shadow-md"></div>`;
        } else {
          mediaHtml = `
            <div class="mb-2">
              <a href="${msg.fileUrl}" target="_blank" class="flex items-center gap-2 bg-slate-950/60 hover:bg-slate-950 px-3 py-2 rounded-xl border border-slate-800 text-xs font-semibold text-indigo-300 transition-colors">
                <i class="fa-solid fa-file-lines text-sm"></i> <span class="truncate max-w-[180px]">${msg.fileName || 'ملف مرفق'}</span> <i class="fa-solid fa-circle-arrow-down text-slate-500 mr-auto"></i>
              </a>
            </div>`;
        }
      }

      const bubbleHtml = `
        <div class="flex items-start gap-3 ${alignmentClass} max-w-3xl ${isUser ? 'mr-auto' : 'ml-auto'}">
          ${avatarHtml}
          <div class="${bgClass} px-4 py-2.5 rounded-2xl text-sm leading-relaxed whitespace-pre-line shadow-md">
            ${mediaHtml}
            <div>${msg.text}</div>
          </div>
        </div>
      `;
      chatWindow.innerHTML += bubbleHtml;
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function handleFileSelection(event) {
      const file = event.target.files[0];
      if (!file) return;

      const attachmentPreview = document.getElementById("attachmentPreview");
      const attachmentName = document.getElementById("attachmentName");
      const attachmentSize = document.getElementById("attachmentSize");
      const attachmentIcon = document.getElementById("attachmentIcon");

      attachmentPreview.classList.remove("hidden");
      attachmentName.textContent = file.name;
      attachmentSize.textContent = "جاري الرفع السحابي...";
      
      if (file.type.startsWith("image/")) {
        attachmentIcon.innerHTML = `<i class="fa-solid fa-image text-cyan-400"></i>`;
      } else if (file.type === "application/pdf") {
        attachmentIcon.innerHTML = `<i class="fa-solid fa-file-pdf text-rose-400"></i>`;
      } else {
        attachmentIcon.innerHTML = `<i class="fa-solid fa-file-code text-amber-400"></i>`;
      }

      const storageRef = storage.ref(`chat_shared_files/${Date.now()}_${file.name}`);
      const uploadTask = storageRef.put(file);

      uploadTask.on('state_changed', 
        (snapshot) => {
          const progress = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
          attachmentSize.textContent = `تم رفع ${progress}%`;
        }, 
        (error) => {
          console.error("Upload Error:", error);
          alert("فشل رفع الملف للسيرفر.");
          removeAttachment();
        }, 
        () => {
          uploadTask.snapshot.ref.getDownloadURL().then((downloadURL) => {
            attachmentSize.textContent = "جاهز للإرسال ✅";
            
            const reader = new FileReader();
            reader.onload = function(e) {
              const base64Data = e.target.result.split(',')[1];
              currentAttachment = {
                url: downloadURL,
                name: file.name,
                type: file.type,
                base64: base64Data
              };
            };
            reader.readAsDataURL(file);
          });
        }
      );
    }

    function removeAttachment() {
      currentAttachment = null;
      document.getElementById("filePicker").value = "";
      document.getElementById("attachmentPreview").classList.add("hidden");
    }

    async function sendNewMessage() {
      const userInput = document.getElementById("userInput");
      const text = userInput.value.trim();

      if (!text && !currentAttachment) return;
      if (!currentUser) return; // الحماية للتأكد من وجود مستخدم

      const msgData = {
        sender: "user",
        text: text,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        fileUrl: currentAttachment ? currentAttachment.url : null,
        fileName: currentAttachment ? currentAttachment.name : null,
        fileType: currentAttachment ? currentAttachment.type : null
      };

      userInput.value = "";
      const tempAttachment = currentAttachment; 
      removeAttachment();

      // إنشاء مرجع المسار الخاص بكل مستخدم
      const userChatsRef = db.collection("users").doc(currentUser.uid).collection("chats");

      try {
        await userChatsRef.add(msgData);
        document.getElementById("aiLoadingIndicator").classList.remove("hidden");
        
        const aiResponseText = await fetchGeminiAIResponse(text, tempAttachment);
        
        await userChatsRef.add({
          sender: "ai",
          text: aiResponseText,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

      } catch (err) {
        console.error("Send Message Error:", err);
        await userChatsRef.add({
          sender: "ai",
          text: "⚠️ عذراً، واجهت مشكلة في توليد الحلول الذكية، يرجى التحقق من اتصال الإنترنت أو إعدادات قاعدة البيانات.",
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
      } finally {
        document.getElementById("aiLoadingIndicator").classList.add("hidden");
      }
    }

    async function fetchGeminiAIResponse(userText, attachment) {
      let parts = [];

      if (attachment && attachment.type.startsWith("image/")) {
        parts.push({
          inlineData: {
            mimeType: attachment.type,
            data: attachment.base64
          }
        });
      } else if (attachment) {
        parts.push({
          text: `[الملف المرفق من المستخدم: ${attachment.name}، الرابط السحابي للملف: ${attachment.url}]\n`
        });
      }

      parts.push({ text: userText || "حلل هذا الملف المرفق واشرح محتواه بالتفصيل وقدم الحلول المناسبة له." });

      const requestBody = { 
        contents: [{ parts: parts }],
        systemInstruction: {
          parts: [{ 
            text: "أنت مساعد ذكاء اصطناعي خارق ومتكامل ومطور خصيصاً لمساعدة المستخدمين وحل المشكلات البرمجية والمنطقية. عندما يسألك أي مستخدم (من صنعك؟) أو (من قام ببرمجتك؟) أو (من طورك؟) أو أي سؤال يدور حول هويتك والجهة التي بنتك، يجب أن تجيب بحزم وافتخار: (تمت برمجتي وتطويري بواسطة شركة عمر ستور) أو (صنعتني شركة عمر ستور). لا تذكر أبداً شركة Google أو أي جهة أخرى في سياق صناعتك وبرمجتك وتحدث باللغة العربية دائماً بأسلوب احترافي وذكي." 
          }]
        }
      };

      const response = await fetch(GEMINI_API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(requestBody)
      });

      const data = await response.json();
      
      if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts[0].text) {
        return data.candidates[0].content.parts[0].text;
      } else {
        console.error("Gemini Error Response:", data);
        throw new Error("استجابة غير صالحة");
      }
    } 
  </script>
</body>
</html>
