<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام السجلات اليومية الذكي</title>
  <!-- Tailwind CSS للواجهات الاحترافية -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- خط قاهرة المميز -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- مكتبة الأيقونات الفخمة FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- حزم Firebase SDK التقليدية المتوافقة مع كودك -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    }
    .glass-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col justify-between p-4 md:p-8">

  <div class="w-full max-w-2xl mx-auto my-auto">
    
    <!-- 1. صفحة تسجيل الدخول -->
    <div id="loginPage" class="glass-card p-8 rounded-2xl shadow-2xl space-y-6">
      <div class="text-center space-y-2">
        <div class="inline-flex p-4 bg-indigo-600/20 text-indigo-400 rounded-full text-3xl mb-2">
          <i class="fa-solid fa-user-shield"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">بوابة تسجيل الدخول</h2>
        <p class="text-slate-400 text-sm">أدخل بياناتك للوصول إلى مفكرتك الآمنة</p>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1.5 mr-1">اسم المستخدم</label>
          <div class="relative">
            <span class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-500"><i class="fa-solid fa-user"></i></span>
            <input type="text" id="username" class="w-full bg-slate-900/60 border border-slate-700 rounded-xl pr-10 pl-4 py-3 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition-all" placeholder="username" required>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1.5 mr-1">كلمة المرور</label>
          <div class="relative">
            <span class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-500"><i class="fa-solid fa-lock"></i></span>
            <input type="password" id="password" class="w-full bg-slate-900/60 border border-slate-700 rounded-xl pr-10 pl-4 py-3 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition-all" placeholder="••••••••" required>
          </div>
        </div>
        
        <button onclick="login()" class="w-full bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 text-white font-semibold py-3 rounded-xl shadow-lg shadow-indigo-600/20 transition-all transform hover:-translate-y-0.5">
          دخول آمن <i class="fa-solid fa-right-to-bracket mr-2"></i>
        </button>
      </div>

      <div class="text-center pt-2">
        <button onclick="toggleRegisterModal(true)" class="text-xs text-cyan-400 hover:underline transition-all">
          <i class="fa-solid fa-user-plus ml-1"></i> ليس لديك حساب؟ اضغط هنا لإنشاء حساب جديد
        </button>
      </div>
    </div>

    <!-- نافذة منبثقة لإنشاء حساب (بديلة للـ prompt) -->
    <div id="registerModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
      <div class="glass-card w-full max-w-md p-6 rounded-2xl space-y-4">
        <h3 class="text-xl font-bold text-slate-200"><i class="fa-solid fa-user-plus text-indigo-400 ml-2"></i> إنشاء حساب جديد</h3>
        <div class="space-y-3">
          <input type="text" id="regFullName" placeholder="الاسم الكامل" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
          <input type="text" id="regUsername" placeholder="اسم المستخدم" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
          <input type="password" id="regPassword" placeholder="كلمة المرور" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500">
        </div>
        <div class="flex gap-2 pt-2">
          <button onclick="submitRegister()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2 rounded-xl text-sm transition-all">تأكيد الإنشاء</button>
          <button onclick="toggleRegisterModal(false)" class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold py-2 rounded-xl text-sm transition-all">إلغاء</button>
        </div>
      </div>
    </div>

    <!-- 2. صفحة السجلات اليومية للمستخدم -->
    <div id="logPage" class="glass-card p-6 md:p-8 rounded-2xl shadow-2xl space-y-6 hidden">
      <div class="flex items-center justify-between border-b border-slate-700 pb-4">
        <div>
          <div id="logGreeting" class="text-xl font-bold text-indigo-300">مرحباً</div>
          <p class="text-xs text-slate-400">دون أفكارك وإنجازاتك اليومية بحرية</p>
        </div>
        <button onclick="logout()" class="bg-rose-500/10 hover:bg-rose-500 text-rose-400 hover:text-white border border-rose-500/20 px-4 py-2 rounded-xl text-xs font-semibold transition-all flex items-center gap-2">
          خروج <i class="fa-solid fa-power-off"></i>
        </button>
      </div>

      <!-- كارت الإحصائيات الفوري -->
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-slate-900/50 border border-slate-800 p-4 rounded-xl flex items-center justify-between">
          <div>
            <p class="text-xs font-semibold text-slate-400">إجمالي السجلات</p>
            <h4 id="totalLogsBadge" class="text-2xl font-bold text-cyan-400 mt-1">0</h4>
          </div>
          <div class="text-xl text-cyan-500/20"><i class="fa-solid fa-book"></i></div>
        </div>
        <div class="bg-slate-900/50 border border-slate-800 p-4 rounded-xl flex items-center justify-between">
          <div>
            <p class="text-xs font-semibold text-slate-400">حالة الحساب</p>
            <h4 class="text-sm font-bold text-emerald-400 mt-2"><i class="fa-solid fa-circle-check ml-1"></i> نشط وآمن</h4>
          </div>
          <div class="text-xl text-emerald-500/20"><i class="fa-solid fa-shield-halved"></i></div>
        </div>
      </div>

      <!-- منطقة إدخال السجل الجديد -->
      <div class="space-y-2">
        <label class="block text-xs font-semibold text-slate-400 mr-1">كتابة سجل جديد</label>
        <textarea id="logInput" rows="3" class="w-full bg-slate-900/60 border border-slate-700 rounded-xl p-4 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition-all placeholder-slate-500 resize-none" placeholder="ماذا يدور في ذهنك اليوم؟..."></textarea>
        <button onclick="saveLog()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2.5 rounded-xl text-sm shadow-lg shadow-emerald-600/10 transition-all flex items-center justify-center gap-2">
          حفظ السجل في السحابة <i class="fa-solid fa-cloud-arrow-up"></i>
        </button>
      </div>

      <!-- فلتر السجلات والبحث -->
      <div class="space-y-3 pt-2">
        <div class="flex items-center justify-between">
          <h3 class="text-md font-bold text-slate-300"><i class="fa-solid fa-folder-open text-indigo-400 ml-2"></i> السجلات المحفوظة</h3>
          <div class="relative w-1/2">
            <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-500 text-xs"><i class="fa-solid fa-magnifying-glass"></i></span>
            <input type="text" id="logSearch" oninput="displayLogs()" class="w-full bg-slate-900/80 border border-slate-700 rounded-lg pr-8 pl-3 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-indigo-500" placeholder="ابحث في السجلات...">
          </div>
        </div>
        <ul id="logList" class="space-y-3 max-h-64 overflow-y-auto pr-1">
          <!-- السجلات تولد هنا ديناميكياً -->
        </ul>
      </div>

      <footer class="text-center text-xs text-slate-500 border-t border-slate-800/60 pt-4">&copy; omartameradel</footer>
    </div>

    <!-- 3. صفحة المشرف (المدير) -->
    <div id="adminPage" class="glass-card p-6 md:p-8 rounded-2xl shadow-2xl space-y-6 hidden">
      <div class="flex items-center justify-between border-b border-slate-700 pb-4">
        <div>
          <h2 class="text-2xl font-extrabold text-amber-400 flex items-center gap-2">
            لوحة الإشراف العليا <i class="fa-solid fa-user-gear"></i>
          </h2>
          <p class="text-xs text-slate-400">إدارة حسابات المستخدمين ومراقبة السجلات</p>
        </div>
        <button onclick="logout()" class="bg-rose-500/10 hover:bg-rose-500 text-rose-400 hover:text-white border border-rose-500/20 px-4 py-2 rounded-xl text-xs font-semibold transition-all">
          خروج <i class="fa-solid fa-power-off mr-1"></i>
        </button>
      </div>

      <div class="space-y-3">
        <h3 class="text-sm font-semibold text-slate-300">قائمة المستخدمين الحاليين:</h3>
        <ul id="userList" class="space-y-4 max-h-[400px] overflow-y-auto pr-1">
          <!-- قائمة المستخدمين تولد هنا -->
        </ul>
      </div>
    </div>

  </div>

  <script>
    // تكوين الـ Firebase الخاص بك
    const firebaseConfig = {
      apiKey: "AIzaSyD5d4cf8zDtauq3zDxG-imfS_2GlJwQoG0",
      authDomain: "user-log-app.firebaseapp.com",
      projectId: "user-log-app",
      storageBucket: "user-log-app.firebasestorage.app",
      messagingSenderId: "491593022038",
      appId: "1:491593022038:web:82f4f6d8e49ab5d6bd99f7",
      measurementId: "G-E24T90NPR9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = null;

    function showLoginPage() {
      document.getElementById("loginPage").classList.remove("hidden");
      document.getElementById("logPage").classList.add("hidden");
      document.getElementById("adminPage").classList.add("hidden");
    }

    function showLogPage() {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("logPage").classList.remove("hidden");
      document.getElementById("adminPage").classList.add("hidden");
      document.getElementById("logGreeting").textContent = "مرحباً، " + (currentUser.fullName || currentUser.username);
      displayLogs();
    }

    function showAdminPage() {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("logPage").classList.add("hidden");
      document.getElementById("adminPage").classList.remove("hidden");

      const userList = document.getElementById("userList");
      userList.innerHTML = "";

      db.collection("users").get().then(snapshot => {
        snapshot.forEach(doc => {
          const user = doc.data();
          if (user.username === "admin") return;

          const logsArray = user.logs || [];

          const li = document.createElement("li");
          li.className = "bg-slate-900/60 border border-slate-800 p-4 rounded-xl flex flex-col md:flex-row md:items-center justify-between gap-4 transition-all hover:border-slate-700";
          li.innerHTML = `
            <div class="space-y-1 text-sm">
              <div class="text-slate-200 font-bold"><i class="fa-solid fa-signature text-slate-400 ml-1"></i> الاسم: ${user.fullName || "—"}</div>
              <div class="text-slate-400 text-xs"><i class="fa-solid fa-at text-slate-500 ml-1"></i> اليوزر: <span class="text-indigo-400">${user.username}</span></div>
              <div class="text-slate-400 text-xs"><i class="fa-solid fa-key text-slate-500 ml-1"></i> كلمة المرور: <span class="font-mono text-amber-400/80">${user.password}</span></div>
              <div class="text-slate-400 text-xs"><i class="fa-solid fa-list-check text-slate-500 ml-1"></i> عدد السجلات: <span class="bg-indigo-950 text-indigo-300 px-2 py-0.5 rounded-full font-bold">${logsArray.length}</span></div>
            </div>
            <button onclick="deleteUser('${doc.id}')" class="bg-rose-600/20 hover:bg-rose-600 text-rose-400 hover:text-white px-4 py-2 rounded-xl text-xs font-semibold transition-all self-end md:self-center">
              حذف الحساب <i class="fa-solid fa-trash-can mr-1"></i>
            </button>
          `;
          userList.appendChild(li);
        });
      });
    }

    function toggleRegisterModal(show) {
      const modal = document.getElementById("registerModal");
      if (show) {
        modal.classList.remove("hidden");
      } else {
        modal.classList.add("hidden");
      }
    }

    function submitRegister() {
      const fullName = document.getElementById("regFullName").value.trim();
      const username = document.getElementById("regUsername").value.trim();
      const password = document.getElementById("regPassword").value.trim();

      if (!fullName || !username || !password) {
        alert("يرجى ملء جميع الحقول المطلوبة.");
        return;
      }

      db.collection("users").where("username", "==", username).get().then(snapshot => {
        if (!snapshot.empty) {
          alert("اسم المستخدم هذا موجود مسبقاً، اختر اسماً آخر.");
          return;
        }

        db.collection("users").add({
          fullName, username, password, logs: []
        }).then(() => {
          alert("تم إنشاء الحساب بنجاح. يمكنك الآن تسجيل الدخول.");
          toggleRegisterModal(false);
          // تصفير الحقول
          document.getElementById("regFullName").value = "";
          document.getElementById("regUsername").value = "";
          document.getElementById("regPassword").value = "";
        });
      });
    }

    function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (username === "admin" && password === "313589") {
        currentUser = { username: "admin" };
        showAdminPage();
        return;
      }

      db.collection("users")
        .where("username", "==", username)
        .where("password", "==", password)
        .get()
        .then(snapshot => {
          if (snapshot.empty) {
            alert("اسم المستخدم أو كلمة المرور غير صحيحة");
            return;
          }
          const doc = snapshot.docs[0];
          currentUser = { id: doc.id, ...doc.data() };
          showLogPage();
        });
    }

    function saveLog() {
      const logText = document.getElementById("logInput").value.trim();
      if (!logText || !currentUser) return;

      // إضافة طابع زمني منسق (تاريخ ووقت) مدمج مع السجل بشكل جميل
      const now = new Date();
      const timestamp = now.toLocaleDateString('ar-EG', { year:'numeric', month:'short', day:'numeric' }) + ' | ' + now.toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' });
      
      const logObject = {
        text: logText,
        time: timestamp
      };

      currentUser.logs = currentUser.logs || [];
      currentUser.logs.push(logObject);

      db.collection("users").doc(currentUser.id).update({
        logs: currentUser.logs
      }).then(() => {
        document.getElementById("logInput").value = "";
        displayLogs();
      });
    }

    function displayLogs() {
      const logList = document.getElementById("logList");
      const searchVal = document.getElementById("logSearch").value.toLowerCase();
      logList.innerHTML = "";

      const logs = currentUser.logs || [];
      document.getElementById("totalLogsBadge").textContent = logs.length;

      // ترتيب عكسي لتظهر السجلات الأحدث في الأعلى دائماً
      const displayArray = [...logs].reverse();

      let hasLogs = false;

      displayArray.forEach((log, reversedIndex) => {
        // حساب الـ index الأصلي في المصفوفة الأساسية من أجل دالة الحذف
        const originalIndex = logs.length - 1 - reversedIndex;

        // دعم السجلات القديمة المخزنة كنصوص فقط بدون كائنات تابعة للتحديث الجديد
        const logText = typeof log === 'object' ? log.text : log;
        const logTime = typeof log === 'object' ? log.time : 'سجل قديم';

        // تصفية البحث
        if (searchVal && !logText.toLowerCase().includes(searchVal)) return;
        hasLogs = true;

        const li = document.createElement("li");
        li.className = "bg-slate-900/50 border border-slate-800 p-4 rounded-xl flex items-start justify-between gap-4 transition-all hover:bg-slate-900/80";
        li.innerHTML = `
          <div class="space-y-1.5 flex-1">
            <p class="text-sm text-slate-100 whitespace-pre-line leading-relaxed">${logText}</p>
            <div class="text-[10px] text-indigo-400 font-medium flex items-center gap-1">
              <i class="fa-regular fa-clock"></i> <span>${logTime}</span>
            </div>
          </div>
          <button onclick="deleteLog(${originalIndex})" class="text-slate-500 hover:text-rose-400 p-1 transition-colors self-center" title="حذف السجل">
            <i class="fa-solid fa-trash-can text-sm"></i>
          </button>
        `;
        logList.appendChild(li);
      });

      if (!hasLogs) {
        logList.innerHTML = `<li class="text-center text-xs text-slate-500 py-4">لا توجد سجلات تطابق بحثك...</li>`;
      }
    }

    function deleteLog(index) {
      if (confirm("هل أنت متأكد من حذف هذا السجل نهائياً؟")) {
        currentUser.logs.splice(index, 1);
        db.collection("users").doc(currentUser.id).update({
          logs: currentUser.logs
        }).then(() => {
          displayLogs();
        });
      }
    }

    function deleteUser(userId) {
      if (confirm("هل أنت متأكد من حذف هذا المستخدم نهائياً؟")) {
        db.collection("users").doc(userId).delete().then(() => {
          showAdminPage();
        });
      }
    }

    function logout() {
      currentUser = null;
      document.getElementById("username").value = "";
      document.getElementById("password").value = "";
      showLoginPage();
    }

    // إقلاع التطبيق
    showLoginPage();
  </script>
</body>
</html>
