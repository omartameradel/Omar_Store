<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عمر تامر محمد عادل</title>

    <meta name="author" content="عمر تامر محمد عادل">

    <meta name="google-site-verification" content="YOUR_VERIFICATION_CODE_HERE">

    <!-- ========================================== -->
    <!-- أيقونات الموقع (Favicons) -->

    <link rel="icon" href="https://omarstor.online/696.png" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="https://omarstor.online/696.png">

    <!-- ========================================== -->
    <!-- إعدادات المشاركة على السوشيال ميديا (Open Graph & Twitter) -->
    <!-- ========================================== -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://omarstor.online/">
    <meta property="og:title" content="المبرمج عمر تامر محمد | الصفحة الرئيسية">
    <meta property="og:description" content="الموقع الرسمي للمبرمج عمر تامر محمد. اكتشف أحدث الحلول البرمجية والمشاريع المبتكرة.">
    <meta property="og:image" content="https://omarstor.online/696.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="المبرمج عمر تامر محمد | الصفحة الرئيسية">
    <meta name="twitter:description" content="الموقع الرسمي للمبرمج عمر تامر محمد. اكتشف أحدث الحلول البرمجية والمشاريع المبتكرة.">
    <meta name="twitter:image" content="https://omarstor.online/696.png">

    <!-- ========================================== -->
    <!-- استدعاءات الخطوط والتصميم (Tailwind & Fonts) -->
    <!-- ========================================== -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- CSS إضافي لحركة الخلفية -->
    <style>
        .bg-animate {
            background-size: 200% 200%;
            animation: gradientMove 10s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-slate-800 to-black text-white flex flex-col min-h-screen font-sans bg-animate">

    <!-- شريط التنقل العلوي (Navbar) -->
    <header class="w-full backdrop-blur-md bg-white/5 border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <!-- الشعار / الاسم -->
            <a href="https://omarstor.online/" class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">
                عمر تامر
            </a>
            
            <!-- روابط الصفحات -->
           
        </div>
    </header>

    <!-- المحتوى الرئيسي -->
    <main class="flex-grow flex flex-col items-center justify-center p-4">
        
        <!-- البطاقة الزجاجية (Glassmorphism) -->
        <div class="backdrop-blur-xl bg-white/5 border border-white/10 rounded-3xl p-10 md:p-16 shadow-2xl text-center max-w-3xl w-full transform transition duration-500 hover:scale-[1.02]">
            
            <h2 class="text-xl md:text-2xl text-cyan-400 font-semibold mb-2 tracking-wide">أهلاً بك في منصة</h2>
            
            <!-- الاسم بتدرج لوني -->
            <h1 class="text-4xl md:text-6xl font-black mb-6 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 drop-shadow-lg">
                المبرمج عمر تامر محمد 
            </h1>
            
            <p class="text-gray-400 text-lg md:text-xl mb-10 leading-relaxed">
                اكتشف أحدث الحلول البرمجية والمشاريع المبتكرة. اضغط على الزر أدناه للبدء في رحلتك معنا.
            </p>
            
            <!-- الزر الحديث -->
            <button id="startBtn" class="group relative inline-flex items-center justify-center gap-3 px-10 py-4 bg-gradient-to-r from-blue-600 to-cyan-500 text-white text-xl font-bold rounded-full shadow-[0_0_20px_rgba(6,182,212,0.4)] hover:shadow-[0_0_35px_rgba(6,182,212,0.7)] hover:-translate-y-1 transition-all duration-300 overflow-hidden">
                <span class="relative z-10 flex items-center gap-2">
                    Get Started
                    <!-- أيقونة سهم صغيرة -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:-translate-x-1 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </span>
                <!-- تأثير إضاءة عند تمرير الماوس -->
                <div class="absolute inset-0 h-full w-full bg-white/20 scale-x-0 group-hover:scale-x-100 transition-transform duration-500 origin-right"></div>
            </button>

        </div>

    </main>

    <!-- الفوتر -->
    <footer class="border-t border-white/10 bg-black/40 backdrop-blur-md text-gray-400 py-6 mt-auto">
        <div class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-sm md:text-base font-medium tracking-wide">جميع الحقوق محفوظة &copy; 2026 - المبرمج عمر تامر</p>
            
            <!-- روابط الفوتر -->
       
        </div>
    </footer>

    <!-- السكريبت -->
    <script>
        // الاستماع لحدث الضغط على الزر لتوجيه المستخدم
        document.getElementById('startBtn').addEventListener('click', function() {
            this.style.transform = "scale(0.95)";
            setTimeout(() => {
                window.location.href = 'https://omarstor.online/';
            }, 150);
        });
    </script>
    
</body>
</html>
